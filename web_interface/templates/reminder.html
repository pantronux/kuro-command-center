<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuro AI - Reminders</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: {
                            light: 'rgba(255, 255, 255, 0.7)',
                            dark: 'rgba(15, 17, 21, 0.8)',
                            border: 'rgba(255, 255, 255, 0.15)',
                            borderDark: 'rgba(255, 255, 255, 0.08)',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
        }
        .dark .glass-sidebar {
            background: rgba(15, 17, 21, 0.85);
            border-right-color: rgba(255, 255, 255, 0.08);
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        .dark .glass-header {
            background: rgba(15, 17, 21, 0.8);
            border-bottom-color: rgba(255, 255, 255, 0.08);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .dark .glass-panel {
            background: rgba(30, 33, 40, 0.9);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .reminder-card {
            transition: all 0.2s ease;
        }
        .reminder-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(156, 163, 175, 0.3);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .notification-toast {
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 glass-sidebar transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="flex flex-col h-full">
                <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-gray-700">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center shadow-lg">
                            <i data-lucide="cat" class="w-6 h-6 text-white"></i>
                        </div>
                        <div>
                            <h1 class="text-lg font-bold text-gray-800 dark:text-white">Kuro AI</h1>
                            <p class="text-xs text-gray-500 dark:text-gray-400">Reminders</p>
                        </div>
                    </div>
                    <button id="closeSidebar" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-gray-600 dark:text-gray-300"></i>
                    </button>
                </div>
                <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                    <a href="/" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all">
                        <i data-lucide="message-square" class="w-5 h-5"></i>
                        <span>Chat</span>
                    </a>
                    <a href="/habits" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all">
                        <i data-lucide="target" class="w-5 h-5"></i>
                        <span>Daily Habits</span>
                    </a>
                    <a href="/reminders" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-medium transition-all hover:bg-emerald-500/20">
                        <i data-lucide="clock" class="w-5 h-5"></i>
                        <span>Reminders</span>
                    </a>
                    <a href="/compliance" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all">
                        <i data-lucide="shield-check" class="w-5 h-5"></i>
                        <span>Compliance</span>
                    </a>
                    <a href="/intelligence" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all">
                        <i data-lucide="radar" class="w-5 h-5"></i>
                        <span>Intelligence Hub</span>
                    </a>
                </nav>
                <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                    <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-800/50">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-400 to-pink-500 flex items-center justify-center text-white font-bold">P</div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 dark:text-white truncate">Pantronux</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">Administrator</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col lg:ml-72">
            <header class="flex items-center justify-between px-6 py-4 glass-header sticky top-0 z-40">
                <div class="flex items-center gap-4">
                    <button id="openSidebar" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i data-lucide="menu" class="w-6 h-6 text-gray-600 dark:text-gray-300"></i>
                    </button>
                    <h2 class="text-xl font-semibold text-gray-800 dark:text-white">Reminders</h2>
                </div>
                <div class="flex items-center gap-3">
                    <button id="darkModeToggle" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all duration-300">
                        <i data-lucide="sun" class="w-5 h-5 text-gray-600 dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 text-gray-300 hidden dark:block"></i>
                    </button>
                </div>
            </header>

            <!-- Content -->
            <div class="flex-1 overflow-y-auto p-6">
                <!-- Stats Cards -->
                <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-6" id="stats-container">
                    <div class="glass-panel rounded-xl p-4 text-center">
                        <div class="text-2xl lg:text-3xl font-bold text-emerald-500" id="stat-total">0</div>
                        <div class="text-xs lg:text-sm text-gray-500 dark:text-gray-400">Total Reminders</div>
                    </div>
                    <div class="glass-panel rounded-xl p-4 text-center">
                        <div class="text-2xl lg:text-3xl font-bold text-yellow-500" id="stat-pending">0</div>
                        <div class="text-xs lg:text-sm text-gray-500 dark:text-gray-400">Pending</div>
                    </div>
                    <div class="glass-panel rounded-xl p-4 text-center">
                        <div class="text-2xl lg:text-3xl font-bold text-orange-500" id="stat-notified">0</div>
                        <div class="text-xs lg:text-sm text-gray-500 dark:text-gray-400">Notified</div>
                    </div>
                    <div class="glass-panel rounded-xl p-4 text-center">
                        <div class="text-2xl lg:text-3xl font-bold text-green-500" id="stat-completed">0</div>
                        <div class="text-xs lg:text-sm text-gray-500 dark:text-gray-400">Completed</div>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                    <!-- Add Reminder Form -->
                    <div class="glass-panel rounded-xl p-6">
                        <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4 flex items-center">
                            <i data-lucide="plus-circle" class="w-5 h-5 mr-2 text-emerald-500"></i> Add New Reminder
                        </h2>
                        <form id="add-reminder-form" class="space-y-4">
                            <div>
                                <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Event Name</label>
                                <input type="text" id="event-name" placeholder="e.g., Audit Medco"
                                       class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg px-4 py-2 text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Date & Time</label>
                                <input type="datetime-local" id="event-time"
                                       class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg px-4 py-2 text-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-emerald-500">
                            </div>
                            <div>
                                <label class="block text-sm text-gray-600 dark:text-gray-400 mb-1">Description (Optional)</label>
                                <textarea id="event-desc" rows="3" placeholder="Additional details..."
                                          class="w-full bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-lg px-4 py-2 text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 resize-none"></textarea>
                            </div>
                            <button type="submit"
                                    class="w-full bg-gradient-to-r from-emerald-500 to-teal-500 hover:from-emerald-600 hover:to-teal-600 text-white px-4 py-2 rounded-lg font-medium transition">
                                Set Reminder
                            </button>
                        </form>
                        <div id="form-response" class="mt-4 hidden"></div>
                    </div>

                    <!-- Upcoming Reminders -->
                    <div class="lg:col-span-2 glass-panel rounded-xl p-6">
                        <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4 flex items-center">
                            <i data-lucide="calendar" class="w-5 h-5 mr-2 text-emerald-500"></i> Upcoming Reminders
                        </h2>
                        <div id="upcoming-list" class="space-y-3 max-h-[500px] overflow-y-auto pr-2">
                            <div class="flex items-center justify-center py-8"><div class="spinner"></div></div>
                        </div>
                    </div>
                </div>

                <!-- History Section -->
                <div class="glass-panel rounded-xl p-6 mt-6">
                    <h2 class="text-lg font-semibold text-gray-800 dark:text-white mb-4 flex items-center">
                        <i data-lucide="history" class="w-5 h-5 mr-2 text-emerald-500"></i> Reminder History
                    </h2>
                    <div id="history-list" class="space-y-2 max-h-[300px] overflow-y-auto pr-2">
                        <div class="flex items-center justify-center py-8"><div class="spinner"></div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Notification Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <script>
        // Load reminders on page load
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadTheme();
            loadStats();
            loadUpcoming();
            loadHistory();
            
            // Refresh every 30 seconds
            setInterval(() => {
                loadStats();
                loadUpcoming();
            }, 30000);
        });

        function loadTheme() {
            const savedTheme = localStorage.getItem('kuro-theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        // Add reminder form
        document.getElementById('add-reminder-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const eventName = document.getElementById('event-name').value.trim();
            const eventTime = document.getElementById('event-time').value;
            const eventDesc = document.getElementById('event-desc').value.trim();
            
            if (!eventName || !eventTime) {
                showFormResponse('Please fill in event name and time.', 'error');
                return;
            }
            
            try {
                const formData = new FormData();
                formData.append('event_name', eventName);
                formData.append('event_time', eventTime);
                formData.append('description', eventDesc);
                formData.append('source', 'web');
                
                const response = await fetch('/api/reminders/add', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showFormResponse(data.confirmation || 'Reminder added successfully!', 'success');
                    document.getElementById('add-reminder-form').reset();
                    loadStats();
                    loadUpcoming();
                } else {
                    showFormResponse(data.error || 'Failed to add reminder.', 'error');
                }
            } catch (err) {
                showFormResponse('Error: ' + err.message, 'error');
            }
        });

        function showFormResponse(message, type) {
            const el = document.getElementById('form-response');
            el.classList.remove('hidden');
            el.className = `mt-4 p-3 rounded-lg ${type === 'success' ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-700 dark:text-emerald-300' : 'bg-red-100 dark:bg-red-900/30 text-red-700 dark:text-red-300'}`;
            el.textContent = message;
            setTimeout(() => el.classList.add('hidden'), 5000);
        }

        async function loadStats() {
            try {
                const response = await fetch('/api/reminders/stats', { credentials: 'include' });
                const data = await response.json();
                
                if (data.stats) {
                    document.getElementById('stat-total').textContent = data.stats.total || 0;
                    document.getElementById('stat-pending').textContent = data.stats.pending || 0;
                    document.getElementById('stat-notified').textContent = (data.stats.notified_10m || 0) + (data.stats.notified_event || 0);
                    document.getElementById('stat-completed').textContent = data.stats.completed || 0;
                }
            } catch (err) {
                console.error('Failed to load stats:', err);
            }
        }

        async function loadUpcoming() {
            try {
                const response = await fetch('/api/reminders/upcoming', { credentials: 'include' });
                const data = await response.json();
                
                const container = document.getElementById('upcoming-list');
                
                if (!data.reminders || data.reminders.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 py-8">No upcoming reminders, Pantronux.</div>';
                    return;
                }
                
                container.innerHTML = data.reminders.map(r => {
                    const eventTime = new Date(r.event_time);
                    const now = new Date();
                    const diff = eventTime - now;
                    const countdown = formatCountdown(diff);
                    const statusColor = getStatusColor(r.status);
                    const hasContext = r.context && r.context.length > 0;
                    
                    return `
                        <div class="reminder-card glass-panel rounded-xl p-4 border-l-4 ${statusColor}">
                            <div class="flex items-start justify-between">
                                <div class="flex-1">
                                    <div class="flex items-center gap-2">
                                        <h3 class="font-semibold text-gray-800 dark:text-white">${escapeHtml(r.event_name)}</h3>
                                        ${hasContext ? '<span class="text-xs bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 px-2 py-0.5 rounded">📎 Context</span>' : ''}
                                    </div>
                                    <p class="text-sm text-gray-500 dark:text-gray-400 mt-1">${eventTime.toLocaleString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</p>
                                    ${r.description ? `<p class="text-sm text-gray-400 dark:text-gray-500 mt-1 line-clamp-2">${escapeHtml(r.description.substring(0, 150))}</p>` : ''}
                                </div>
                                <div class="text-right ml-4">
                                    <div class="countdown text-lg font-mono text-emerald-500">${countdown}</div>
                                    <span class="text-xs text-gray-400 dark:text-gray-500">${r.status.replace('_', ' ')}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to load upcoming:', err);
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch('/api/reminders/history', { credentials: 'include' });
                const data = await response.json();
                
                const container = document.getElementById('history-list');
                
                if (!data.reminders || data.reminders.length === 0) {
                    container.innerHTML = '<div class="text-center text-gray-500 dark:text-gray-400 py-8">No history yet.</div>';
                    return;
                }
                
                container.innerHTML = data.reminders.map(r => {
                    const eventTime = new Date(r.event_time);
                    return `
                        <div class="flex items-center justify-between py-2 border-b border-gray-200 dark:border-gray-700">
                            <div>
                                <span class="text-gray-800 dark:text-white">${escapeHtml(r.event_name)}</span>
                                <span class="text-xs text-gray-400 dark:text-gray-500 ml-2">${eventTime.toLocaleDateString()}</span>
                            </div>
                            <span class="text-xs px-2 py-1 rounded ${r.status === 'completed' ? 'bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400' : 'bg-gray-100 dark:bg-gray-700 text-gray-500 dark:text-gray-400'}">${r.status}</span>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error('Failed to load history:', err);
            }
        }

        function formatCountdown(diffMs) {
            if (diffMs <= 0) return 'NOW';
            
            const days = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diffMs % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diffMs % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diffMs % (1000 * 60)) / 1000);
            
            if (days > 0) return `${days}d ${hours}h`;
            if (hours > 0) return `${hours}h ${minutes}m`;
            if (minutes > 0) return `${minutes}m ${seconds}s`;
            return `${seconds}s`;
        }

        function getStatusColor(status) {
            switch (status) {
                case 'pending': return 'border-emerald-500';
                case 'notified_10m': return 'border-yellow-500';
                case 'notified_event': return 'border-red-500';
                case 'completed': return 'border-green-500 opacity-60';
                default: return 'border-gray-300 dark:border-gray-600';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Check for notifications every 10 seconds
        async function checkNotifications() {
            try {
                const response = await fetch('/api/reminders/notifications', { credentials: 'include' });
                const data = await response.json();
                
                if (data.notifications && data.notifications.length > 0) {
                    data.notifications.forEach(n => {
                        showToast(n.message, n.type);
                    });
                }
            } catch (err) {
                console.error('Failed to check notifications:', err);
            }
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            const colors = {
                info: 'from-emerald-500 to-teal-500',
                warning: 'from-yellow-500 to-orange-500',
                urgent: 'from-red-500 to-pink-500'
            };
            
            toast.className = `notification-toast glass-panel p-4 rounded-lg bg-gradient-to-r ${colors[type] || colors.info} max-w-sm text-white`;
            toast.innerHTML = `
                <div class="flex items-start gap-3">
                    <span class="text-xl">${type === 'urgent' ? '🔔' : type === 'warning' ? '⏰' : '📅'}</span>
                    <div class="flex-1">
                        <p class="text-sm font-medium">${escapeHtml(message)}</p>
                    </div>
                    <button onclick="this.parentElement.parentElement.remove()" class="text-white/60 hover:text-white">×</button>
                </div>
            `;
            
            container.appendChild(toast);
            
            // Auto-remove after 10 seconds
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.style.animation = 'slideIn 0.3s ease-in reverse';
                    setTimeout(() => toast.remove(), 300);
                }
            }, 10000);
        }

        // Start notification polling
        setInterval(checkNotifications, 10000);

        // Dark mode toggle
        document.getElementById('darkModeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('kuro-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });

        // Sidebar toggle
        document.getElementById('openSidebar').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
        });
        document.getElementById('closeSidebar').addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('-translate-x-full');
        });
    </script>
</body>
</html>
