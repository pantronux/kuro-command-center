<!DOCTYPE html>
<!--
  Header Doc ---
  Purpose: Intelligence briefings hub (autonomous research results).
  Caller: main.py GET "/intelligence".
  Dependencies: /api/intelligence/*, Tailwind, Lucide.
  Main Sections: daily briefings list, topic watchlist, synthesis preview.
  Side Effects: Polls /api/intelligence/briefings; CRUD on /api/intelligence/topics.
-->
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuro AI - Intelligence Hub</title>
    <link rel="icon" type="image/x-icon" href="/profile/favicon.ico">
    <link rel="apple-touch-icon" href="/profile/kuro_avatar.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: {
                            light: 'rgba(255, 255, 255, 0.7)',
                            dark: 'rgba(15, 17, 21, 0.8)',
                            border: 'rgba(255, 255, 255, 0.15)',
                            borderDark: 'rgba(255, 255, 255, 0.08)',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-sidebar {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-right: 1px solid rgba(0, 0, 0, 0.08);
        }
        .dark .glass-sidebar {
            background: rgba(15, 17, 21, 0.85);
            border-right-color: rgba(255, 255, 255, 0.08);
        }
        .glass-header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }
        .dark .glass-header {
            background: rgba(15, 17, 21, 0.8);
            border-bottom-color: rgba(255, 255, 255, 0.08);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 0, 0, 0.06);
        }
        .dark .glass-panel {
            background: rgba(30, 33, 40, 0.9);
            border-color: rgba(255, 255, 255, 0.08);
        }
        .briefing-item {
            transition: all 0.2s ease;
        }
        .briefing-item:hover {
            background: rgba(16, 185, 129, 0.1);
        }
        .briefing-item.active {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
        }
        /* Dark mode (default) */
        .dark .markdown-content {
            line-height: 1.7;
            color: #e5e7eb;
        }
        .dark .markdown-content h1, .dark .markdown-content h2, .dark .markdown-content h3,
        .dark .markdown-content h4, .dark .markdown-content h5, .dark .markdown-content h6 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #f9fafb;
        }
        .dark .markdown-content p {
            margin-bottom: 0.75rem;
            color: #d1d5db;
        }
        .dark .markdown-content ul, .dark .markdown-content ol {
            margin-left: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .dark .markdown-content li {
            margin-bottom: 0.375rem;
            color: #d1d5db;
        }
        .dark .markdown-content strong, .dark .markdown-content b {
            color: #f3f4f6;
        }
        .dark .markdown-content em, .dark .markdown-content i {
            color: #c9cdd1;
        }
        .dark .markdown-content a {
            color: #34d399;
        }
        .dark .markdown-content code {
            background: rgba(255, 255, 255, 0.1);
            color: #e5e7eb;
        }
        .dark .markdown-content pre {
            background: #1e293b;
            color: #e2e8f0;
        }
        .dark .markdown-content blockquote {
            border-left: 3px solid #10b981;
            color: #9ca3af;
        }
        .dark .markdown-content table {
            color: #d1d5db;
        }
        .dark .markdown-content th {
            background: rgba(255, 255, 255, 0.05);
            color: #f3f4f6;
        }
        .dark .markdown-content td {
            color: #d1d5db;
        }
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(156, 163, 175, 0.3);
            border-top-color: #10b981;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        /* Light mode styles */
        .briefing-item {
            color: #374151;
        }
        .briefing-item:hover {
            background: rgba(16, 185, 129, 0.08);
        }
        .briefing-item.active {
            background: rgba(16, 185, 129, 0.12);
        }
        .markdown-content {
            line-height: 1.7;
            color: #1f2937;
        }
        .markdown-content h1, .markdown-content h2, .markdown-content h3,
        .markdown-content h4, .markdown-content h5, .markdown-content h6 {
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
            color: #111827;
        }
        .markdown-content p {
            margin-bottom: 0.75rem;
            color: #374151;
        }
        .markdown-content ul, .markdown-content ol {
            margin-left: 1.5rem;
            margin-bottom: 0.75rem;
        }
        .markdown-content li {
            margin-bottom: 0.375rem;
            color: #374151;
        }
        .markdown-content strong, .markdown-content b {
            color: #111827;
        }
        .markdown-content em, .markdown-content i {
            color: #4b5563;
        }
        .markdown-content a {
            color: #059669;
        }
        .markdown-content code {
            background: rgba(0, 0, 0, 0.06);
            color: #1f2937;
        }
        .markdown-content pre {
            background: #1e293b;
            color: #e2e8f0;
        }
        .markdown-content blockquote {
            border-left: 3px solid #10b981;
            color: #6b7280;
        }
        .markdown-content table {
            color: #374151;
        }
        .markdown-content th {
            background: rgba(0, 0, 0, 0.04);
            color: #111827;
        }
        .markdown-content td {
            color: #374151;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 min-h-screen transition-colors duration-300">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 glass-sidebar transform -translate-x-full lg:translate-x-0 transition-transform duration-300 ease-in-out">
            <div class="flex flex-col h-full">
                <div class="flex items-center justify-between p-6 border-b border-gray-200 dark:border-gray-700">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center shadow-lg">
                            <i data-lucide="cat" class="w-6 h-6 text-white"></i>
                        </div>
                        <div>
                            <h1 class="text-lg font-bold text-gray-800 dark:text-white">Kuro AI</h1>
                            <p class="text-xs text-gray-500 dark:text-gray-400">Intelligence Hub</p>
                        </div>
                    </div>
                    <button id="closeSidebar" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i data-lucide="x" class="w-5 h-5 text-gray-600 dark:text-gray-300"></i>
                    </button>
                </div>
                <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                    <a href="/" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all">
                        <i data-lucide="message-square" class="w-5 h-5"></i>
                        <span>Chat</span>
                    </a>
                    <a href="/tutorial" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all">
                        <i data-lucide="book-open" class="w-5 h-5"></i>
                        <span>Tutorial</span>
                    </a>
                    <a href="/intelligence" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-medium transition-all hover:bg-emerald-500/20">
                        <i data-lucide="radar" class="w-5 h-5"></i>
                        <span>Intelligence Hub</span>
                    </a>
                </nav>
                <div class="p-4 border-t border-gray-200 dark:border-gray-700">
                    <div class="flex items-center gap-3 px-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-800/50">
                        <div class="w-10 h-10 rounded-full bg-gradient-to-br from-purple-400 to-pink-500 flex items-center justify-center text-white font-bold">P</div>
                        <div class="flex-1 min-w-0">
                            <p class="text-sm font-medium text-gray-800 dark:text-white truncate">Pantronux</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400">Administrator</p>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col lg:ml-72">
            <header class="flex items-center justify-between px-6 py-4 glass-header sticky top-0 z-40">
                <div class="flex items-center gap-4">
                    <button id="openSidebar" class="lg:hidden p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 transition-colors">
                        <i data-lucide="menu" class="w-6 h-6 text-gray-600 dark:text-gray-300"></i>
                    </button>
                    <h2 class="text-xl font-semibold text-gray-800 dark:text-white">Intelligence Hub</h2>
                </div>
                <div class="flex items-center gap-3">
                    <button id="darkModeToggle" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-all duration-300">
                        <i data-lucide="sun" class="w-5 h-5 text-gray-600 dark:hidden"></i>
                        <i data-lucide="moon" class="w-5 h-5 text-gray-300 hidden dark:block"></i>
                    </button>
                </div>
            </header>

            <!-- Intelligence Content -->
            <div class="flex-1 flex overflow-hidden">
                <!-- Briefing List -->
                <div class="w-80 border-r border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800/50 overflow-y-auto">
                    <div class="p-4">
                        <div class="relative mb-4">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-gray-400"></i>
                            <input type="text" id="searchInput" placeholder="Search briefings..." class="w-full pl-10 pr-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-sm text-gray-800 dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                        </div>
                        <div id="briefingList" class="space-y-2">
                            <div class="flex items-center justify-center py-8"><div class="spinner"></div></div>
                        </div>
                    </div>
                </div>

                <!-- Briefing Detail -->
                <div class="flex-1 overflow-y-auto p-6 bg-gray-50 dark:bg-gray-900" id="briefingDetail">
                    <div class="flex items-center justify-center h-full text-gray-500 dark:text-gray-400">
                        <div class="text-center">
                            <i data-lucide="newspaper" class="w-16 h-16 mx-auto mb-4 opacity-50"></i>
                            <p class="text-lg">Select a briefing to view details</p>
                            <p class="text-sm mt-2">Daily intelligence reports are generated at 08:00 AM</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const CONFIG = { API_BASE: '/api' };
        let selectedBriefingId = null;

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            loadTheme();
            loadBriefings();
            setupEventListeners();
        });

        function loadTheme() {
            const savedTheme = localStorage.getItem('kuro-theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

        function setupEventListeners() {
            document.getElementById('darkModeToggle').addEventListener('click', () => {
                document.documentElement.classList.toggle('dark');
                localStorage.setItem('kuro-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
            });

            document.getElementById('searchInput').addEventListener('input', debounce((e) => {
                loadBriefings(e.target.value);
            }, 300));

            document.getElementById('openSidebar').addEventListener('click', () => {
                document.getElementById('sidebar').classList.remove('-translate-x-full');
            });
            document.getElementById('closeSidebar').addEventListener('click', () => {
                document.getElementById('sidebar').classList.add('-translate-x-full');
            });
        }

        function debounce(func, wait) {
            let timeout;
            return function(...args) {
                clearTimeout(timeout);
                timeout = setTimeout(() => func.apply(this, args), wait);
            };
        }

        async function loadBriefings(searchQuery = null) {
            const listEl = document.getElementById('briefingList');
            listEl.innerHTML = '<div class="flex items-center justify-center py-8"><div class="spinner"></div></div>';

            try {
                const url = searchQuery 
                    ? `${CONFIG.API_BASE}/intelligence/history?search=${encodeURIComponent(searchQuery)}`
                    : `${CONFIG.API_BASE}/intelligence/history`;
                
                const response = await fetch(url, { credentials: 'include' });
                const data = await response.json();

                if (data.status === 'success' && data.briefings.length > 0) {
                    listEl.innerHTML = data.briefings.map(b => `
                        <div class="briefing-item p-3 rounded-xl cursor-pointer border border-transparent ${selectedBriefingId === b.id ? 'active' : ''}" onclick="loadBriefingDetail(${b.id})">
                            <div class="flex items-center justify-between mb-1">
                                <span class="text-sm font-medium text-gray-800 dark:text-white">${b.date}</span>
                                <span class="text-xs text-gray-400">${new Date(b.created_at).toLocaleTimeString('id-ID', {hour: '2-digit', minute: '2-digit'})}</span>
                            </div>
                            <div class="flex gap-1 flex-wrap">
                                <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-red-100 dark:bg-red-900/30 text-red-600 dark:text-red-400">#Security</span>
                                <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-blue-100 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400">#AI</span>
                                <span class="text-[10px] px-1.5 py-0.5 rounded-full bg-green-100 dark:bg-green-900/30 text-green-600 dark:text-green-400">#Finance</span>
                            </div>
                        </div>
                    `).join('');
                } else {
                    listEl.innerHTML = '<div class="text-center py-8 text-gray-500 dark:text-gray-400"><i data-lucide="inbox" class="w-8 h-8 mx-auto mb-2 opacity-50"></i><p class="text-sm">No briefings available</p></div>';
                }
                lucide.createIcons();
            } catch (error) {
                listEl.innerHTML = '<p class="text-center py-8 text-red-500">Failed to load briefings</p>';
            }
        }

        async function loadBriefingDetail(id) {
            selectedBriefingId = id;
            const detailEl = document.getElementById('briefingDetail');
            detailEl.innerHTML = '<div class="flex items-center justify-center h-full"><div class="spinner"></div></div>';

            try {
                const response = await fetch(`${CONFIG.API_BASE}/intelligence/history`, { credentials: 'include' });
                const data = await response.json();
                const briefing = data.briefings.find(b => b.id === id);

                if (briefing) {
                    detailEl.innerHTML = `
                        <div class="max-w-4xl mx-auto">
                            <div class="flex items-center justify-between mb-6">
                                <h3 class="text-2xl font-bold text-gray-800 dark:text-white">Daily Intelligence Briefing</h3>
                                <span class="px-3 py-1 rounded-full bg-emerald-100 dark:bg-emerald-900/30 text-emerald-600 dark:text-emerald-400 text-sm font-medium">${briefing.date}</span>
                            </div>
                            <div class="markdown-content glass-panel rounded-2xl p-6">
                                ${marked.parse(briefing.summary_text)}
                            </div>
                            ${briefing.stock_recommendations && briefing.stock_recommendations.length > 0 ? `
                                <div class="mt-6 glass-panel rounded-2xl p-6">
                                    <h4 class="text-lg font-semibold text-gray-800 dark:text-white mb-4 flex items-center gap-2">
                                        <i data-lucide="trending-up" class="w-5 h-5 text-emerald-500"></i>
                                        📈 Rekomendasi Saham
                                    </h4>
                                    <div class="space-y-6">
                                        ${['below_100k', 'below_500k', 'above_500k'].map(cat => {
                                            const catStocks = briefing.stock_recommendations.filter(s => s.price_category === cat);
                                            if (catStocks.length === 0) return '';
                                            
                                            const titles = {
                                                'below_100k': '💸 Di bawah Rp 100.000 / LOT',
                                                'below_500k': '💰 Rp 100rb – Rp 500rb / LOT',
                                                'above_500k': '💎 Di atas Rp 500.000 / LOT'
                                            };
                                            
                                            return `
                                                <div>
                                                    <h5 class="text-xs font-bold uppercase tracking-wider text-gray-500 dark:text-gray-400 mb-3">${titles[cat]}</h5>
                                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                        ${catStocks.map(s => `
                                                            <div class="p-4 rounded-xl border border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/30">
                                                                <div class="flex justify-between items-start mb-2">
                                                                    <div>
                                                                        <span class="font-bold text-gray-800 dark:text-white">${s.stock_code}</span>
                                                                        <p class="text-[10px] text-gray-500 truncate max-w-[150px]">${s.company_name || 'IDX'}</p>
                                                                    </div>
                                                                    <span class="px-2 py-0.5 rounded text-[10px] font-bold ${
                                                                        s.conclusion === 'WORTH BUYING' ? 'bg-emerald-100 text-emerald-700' : 
                                                                        s.conclusion === 'HOLD' ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'
                                                                    }">${s.conclusion || 'N/A'}</span>
                                                                </div>
                                                                <div class="text-xs space-y-1 mb-3">
                                                                    <p class="flex justify-between"><span class="text-gray-500 dark:text-gray-400">Harga / LOT:</span> <span class="font-mono font-medium dark:text-gray-300">Rp ${(s.current_price_per_lot || 0).toLocaleString('id-ID')}</span></p>
                                                                    <p class="flex justify-between"><span class="text-gray-500 dark:text-gray-400">Proyeksi 1thn (ROI):</span> <span class="font-medium ${s.projected_roi_1y > 0 ? 'text-emerald-500' : 'text-amber-500'}">${s.projected_roi_1y ? s.projected_roi_1y + '%' : 'N/A'}</span></p>
                                                                </div>
                                                                <p class="text-[11px] text-gray-600 dark:text-gray-400 line-clamp-2 italic">"${s.triangulation_summary || ''}"</p>
                                                            </div>
                                                        `).join('')}
                                                    </div>
                                                </div>
                                            `;
                                        }).join('')}
                                    </div>
                                </div>
                            ` : ''}
                            ${briefing.experimental_signals && briefing.experimental_signals.length > 0 ? `
                                <div class="mt-6 glass-panel rounded-2xl p-6">
                                    <h4 class="text-lg font-semibold text-gray-800 dark:text-white mb-3 flex items-center gap-2">
                                        <i data-lucide="flask-conical" class="w-5 h-5 text-purple-500"></i>
                                        Experimental Signals
                                    </h4>
                                    <ul class="space-y-2">
                                        ${briefing.experimental_signals.map(s => `<li class="flex items-start gap-2"><span class="text-purple-500 mt-1">→</span><span class="text-gray-700 dark:text-gray-300">${s}</span></li>`).join('')}
                                    </ul>
                                </div>
                            ` : ''}
                        </div>
                    `;
                    lucide.createIcons();
                    loadBriefings(document.getElementById('searchInput').value);
                } else {
                    detailEl.innerHTML = '<p class="text-center text-red-500">Briefing not found</p>';
                }
            } catch (error) {
                detailEl.innerHTML = '<p class="text-center text-red-500">Failed to load briefing details</p>';
            }
        }
    </script>
</body>
</html>
