<!DOCTYPE html>
<!--
  Header Doc ---
  Purpose: Feature-flagged Frontend V2 chat workspace for Kuro AI.
  Caller: main.py GET "/" and GET "/chat" when KURO_FRONTEND_V2_ENABLED=true.
  Dependencies: static/css/v2.css, static/js/v2/*.js, Tailwind CDN, Lucide.
  Main Sections: chat session sidebar, conversational workspace, profile menu, admin settings modal.
  Side Effects: Browser fetch/SSE calls to existing authenticated APIs.
-->
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuro AI - Chat Workspace</title>
    <link rel="icon" type="image/x-icon" href="/profile/favicon.ico">
    <link rel="shortcut icon" type="image/x-icon" href="/profile/favicon.ico">
    <link rel="apple-touch-icon" href="/profile/kuro_avatar.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="/static/css/v2.css">
</head>

<body class="kuro-v2-body" data-kuro-frontend-v2="true">
    <script id="kuro-v2-context" type="application/json">
        {{ {
            "username": username,
            "displayName": display_name,
            "role": role,
            "isAdmin": is_admin,
            "restrictedPersona": restricted_persona,
            "masterName": master_name,
            "frontendV2Enabled": frontend_v2_enabled
        } | tojson }}
    </script>

    <div id="kuroAppV2" class="kuro-v2-shell" data-testid="frontend-v2-shell"
        data-is-admin="{{ 'true' if is_admin else 'false' }}">
        <aside class="kuro-v2-sidebar" id="v2Sidebar" aria-label="Chat sessions">
            <div class="kuro-v2-brand">
                <img src="/profile/kuro_avatar.png" alt="Kuro" class="kuro-v2-avatar">
                <div>
                    <p class="kuro-v2-brand-name">Kuro AI</p>
                    <p class="kuro-v2-brand-meta">Runtime Sovereign</p>
                </div>
                <button class="kuro-v2-icon-btn lg:hidden" id="v2CloseSidebar" type="button" aria-label="Close sidebar"
                    title="Close sidebar">
                    <i data-lucide="x"></i>
                </button>
            </div>

            <div class="kuro-v2-sidebar-actions">
                <button class="kuro-v2-primary-btn" id="v2NewChatBtn" type="button">
                    <i data-lucide="plus"></i>
                    <span>New Chat</span>
                </button>
                <label class="kuro-v2-search" aria-label="Search chats">
                    <i data-lucide="search"></i>
                    <input id="v2ChatSearch" type="search" placeholder="Search chats" autocomplete="off">
                </label>
            </div>

            <nav class="kuro-v2-session-nav" aria-label="Session list">
                <section class="kuro-v2-session-section">
                    <h2>Pinned</h2>
                    <div id="v2PinnedSessions" class="kuro-v2-session-list" data-empty="No pinned chats"></div>
                </section>
                <section class="kuro-v2-session-section">
                    <h2>Recent</h2>
                    <div id="v2SessionList" class="kuro-v2-session-list" data-empty="No recent chats"></div>
                    <button id="v2LoadMoreChats" class="kuro-v2-ghost-btn" type="button">
                        <i data-lucide="list-plus"></i>
                        <span>More</span>
                    </button>
                </section>
            </nav>
        </aside>

        <div class="kuro-v2-main">
            <header class="kuro-v2-topbar">
                <div class="kuro-v2-topbar-left">
                    <button class="kuro-v2-icon-btn lg:hidden" id="v2OpenSidebar" type="button"
                        aria-label="Open sidebar" title="Open sidebar">
                        <i data-lucide="panel-left-open"></i>
                    </button>
                    <div>
                        <p class="kuro-v2-eyebrow" id="v2ActivePersona">Consultant</p>
                        <h1 id="v2ChatTitle">Chat Workspace</h1>
                    </div>
                </div>

                <div class="kuro-v2-topbar-actions">
                    <label class="kuro-v2-select-wrap" title="Model">
                        <i data-lucide="brain-circuit"></i>
                        <select id="v2ModelSelect" data-testid="safe-model-aliases">
                            <option value="gemini_fast">gemini_fast</option>
                            <option value="openai_nano">openai_nano</option>
                            <option value="claude_fast">claude_fast</option>
                            <option value="deepseek_fast">deepseek_fast</option>
                        </select>
                    </label>
                    <button class="kuro-v2-icon-btn" id="v2OpenSources" type="button" aria-label="Sources"
                        title="Sources">
                        <i data-lucide="book-marked"></i>
                    </button>
                    <button class="kuro-v2-icon-btn" id="v2OpenMemory" type="button" aria-label="Memory"
                        title="Memory">
                        <i data-lucide="database"></i>
                    </button>
                    <div class="kuro-v2-profile">
                        <button id="v2ProfileToggle" class="kuro-v2-profile-btn" type="button"
                            aria-haspopup="true" aria-expanded="false">
                            <span>{{ display_name[0]|upper }}</span>
                            <i data-lucide="chevron-down"></i>
                        </button>
                        <div id="v2ProfileMenu" class="kuro-v2-profile-menu hidden" role="menu">
                            <div class="kuro-v2-profile-meta">
                                <strong>{{ display_name }}</strong>
                                <span>{{ role }}</span>
                            </div>
                            {% if is_admin %}
                            <button id="v2OpenAdminSettings" type="button" role="menuitem"
                                data-testid="admin-settings-entry">
                                <i data-lucide="sliders-horizontal"></i>
                                <span>Administration Settings</span>
                            </button>
                            {% endif %}
                            <button id="v2OpenModelSettings" type="button" role="menuitem">
                                <i data-lucide="settings-2"></i>
                                <span>Model Settings</span>
                            </button>
                            <button id="v2LogoutBtn" type="button" role="menuitem">
                                <i data-lucide="log-out"></i>
                                <span>Logout</span>
                            </button>
                        </div>
                    </div>
                </div>
            </header>

            <main class="kuro-v2-chat-pane" aria-live="polite">
                <div id="v2StatusBar" class="kuro-v2-status" data-state="ready">
                    <span id="v2StatusText">Ready</span>
                    <button id="v2RetryLast" class="kuro-v2-inline-btn hidden" type="button">
                        <i data-lucide="rotate-ccw"></i>
                        <span>Retry</span>
                    </button>
                </div>
                <div id="v2Messages" class="kuro-v2-messages">
                    <article class="kuro-v2-message assistant">
                        <div class="kuro-v2-message-avatar">
                            <img src="/profile/kuro_avatar.png" alt="Kuro">
                        </div>
                        <div class="kuro-v2-message-body">
                            <div class="kuro-v2-message-content">Hello {{ master_name }}.</div>
                            <div class="kuro-v2-message-actions">
                                <button type="button" data-action="copy" title="Copy" aria-label="Copy">
                                    <i data-lucide="copy"></i>
                                </button>
                                <button type="button" data-action="bookmark" title="Bookmark" aria-label="Bookmark">
                                    <i data-lucide="bookmark"></i>
                                </button>
                                <button type="button" data-action="export" title="Export" aria-label="Export">
                                    <i data-lucide="download"></i>
                                </button>
                            </div>
                        </div>
                    </article>
                </div>
            </main>

            <footer class="kuro-v2-composer">
                <div class="kuro-v2-tool-row" role="toolbar" aria-label="Chat tools">
                    <button id="v2WebSearchToggle" class="kuro-v2-tool-toggle" type="button" aria-pressed="false">
                        <i data-lucide="globe"></i>
                        <span>Web Search</span>
                    </button>
                    <button id="v2DeepResearchBtn" class="kuro-v2-tool-btn" type="button">
                        <i data-lucide="search-check"></i>
                        <span>Deep Research</span>
                    </button>
                    <button id="v2AgentModeToggle" class="kuro-v2-tool-toggle" type="button" aria-pressed="false">
                        <i data-lucide="route"></i>
                        <span>Agent Mode</span>
                    </button>
                    <button id="v2CreateTaskBtn" class="kuro-v2-tool-btn" type="button">
                        <i data-lucide="check-square"></i>
                        <span>Task</span>
                    </button>
                    <button id="v2CreateReminderBtn" class="kuro-v2-tool-btn" type="button">
                        <i data-lucide="bell-plus"></i>
                        <span>Reminder</span>
                    </button>
                    <button id="v2MarketBtn" class="kuro-v2-tool-btn" type="button">
                        <i data-lucide="line-chart"></i>
                        <span>Market</span>
                    </button>
                </div>
                <form id="v2ComposerForm" class="kuro-v2-input-row">
                    <textarea id="v2MessageInput" rows="1" maxlength="32000"
                        placeholder="Message Kuro"></textarea>
                    <button id="v2SendBtn" class="kuro-v2-send-btn" type="submit" aria-label="Send" title="Send">
                        <i data-lucide="send-horizontal"></i>
                    </button>
                </form>
            </footer>
        </div>

        <aside id="v2RightDrawer" class="kuro-v2-drawer" data-open="false" aria-label="Context drawer">
            <div class="kuro-v2-drawer-header">
                <h2 id="v2DrawerTitle">Sources</h2>
                <button id="v2CloseDrawer" class="kuro-v2-icon-btn" type="button" aria-label="Close drawer"
                    title="Close drawer">
                    <i data-lucide="x"></i>
                </button>
            </div>
            <div id="v2DrawerContent" class="kuro-v2-drawer-content"></div>
        </aside>
    </div>

    <div id="v2ModelSettingsModal" class="kuro-v2-modal hidden" role="dialog" aria-modal="true"
        aria-labelledby="v2ModelSettingsTitle">
        <div class="kuro-v2-modal-panel">
            <header>
                <h2 id="v2ModelSettingsTitle">Model Settings</h2>
                <button class="kuro-v2-icon-btn" data-close-modal="v2ModelSettingsModal" type="button"
                    aria-label="Close model settings" title="Close">
                    <i data-lucide="x"></i>
                </button>
            </header>
            <label class="kuro-v2-field">
                <span>Temperature</span>
                <input id="v2Temperature" type="range" min="0" max="2" step="0.1" value="0.7">
                <output id="v2TemperatureValue">0.7</output>
            </label>
            <label class="kuro-v2-field">
                <span>Runtime</span>
                <select id="v2RuntimeSelect">
                    <option value="sovereign">sovereign</option>
                    <option value="research">research</option>
                    <option value="qa">qa</option>
                </select>
            </label>
            <button id="v2SaveSettingsBtn" class="kuro-v2-primary-btn" type="button">
                <i data-lucide="save"></i>
                <span>Save</span>
            </button>
        </div>
    </div>

    {% if is_admin %}
    <div id="v2AdminSettingsModal" class="kuro-v2-modal hidden" role="dialog" aria-modal="true"
        aria-labelledby="v2AdminSettingsTitle" data-testid="admin-settings-modal">
        <div class="kuro-v2-admin-panel">
            <header>
                <h2 id="v2AdminSettingsTitle">Administration Settings</h2>
                <button class="kuro-v2-icon-btn" data-close-modal="v2AdminSettingsModal" type="button"
                    aria-label="Close administration settings" title="Close">
                    <i data-lucide="x"></i>
                </button>
            </header>
            <div class="kuro-v2-admin-layout">
                <nav class="kuro-v2-admin-tabs" aria-label="Administration Settings sections">
                    <button type="button" data-admin-panel="system-status" class="active">
                        <i data-lucide="activity"></i><span>System Status</span>
                    </button>
                    <button type="button" data-admin-panel="storage-health">
                        <i data-lucide="hard-drive"></i><span>Storage Health</span>
                    </button>
                    <button type="button" data-admin-panel="memory-v3">
                        <i data-lucide="database"></i><span>Memory V3</span>
                    </button>
                    <button type="button" data-admin-panel="providers">
                        <i data-lucide="cpu"></i><span>Provider/Model Settings</span>
                    </button>
                    <button type="button" data-admin-panel="temperature">
                        <i data-lucide="thermometer"></i><span>AI Temperature</span>
                    </button>
                    <button type="button" data-admin-panel="runtime">
                        <i data-lucide="workflow"></i><span>Runtime Settings</span>
                    </button>
                    <button type="button" data-admin-panel="market">
                        <i data-lucide="line-chart"></i><span>Market Sentinel</span>
                    </button>
                    <button type="button" data-admin-panel="ingestion">
                        <i data-lucide="database-zap"></i><span>Ingestion Center</span>
                    </button>
                    <button type="button" data-admin-panel="evaluation">
                        <i data-lucide="clipboard-check"></i><span>Evaluation</span>
                    </button>
                    <button type="button" data-admin-panel="backup">
                        <i data-lucide="archive-restore"></i><span>Backup</span>
                    </button>
                    <button type="button" data-admin-panel="telegram">
                        <i data-lucide="send"></i><span>Telegram</span>
                    </button>
                    <button type="button" data-admin-panel="feature-flags">
                        <i data-lucide="flag"></i><span>Feature Flags</span>
                    </button>
                </nav>
                <section id="v2AdminPanelContent" class="kuro-v2-admin-content" tabindex="0"></section>
            </div>
        </div>
    </div>
    {% endif %}

    <script type="module" src="/static/js/v2/chat.js"></script>
</body>

</html>
