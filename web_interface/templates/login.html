<!DOCTYPE html>
<!--
  Header Doc ---
  Purpose: Revamped Authentication screen with split-layout and particles.js (Runtime Sovereign Pre V.2.0.0 Beta 1).
  Caller: main.py GET "/login".
  Dependencies: POST /auth/login, Tailwind, particles.js, Font Awesome 6.
  Main Sections: Left Branding Panel (Particles), Right Login Panel.
-->
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuro AI - Login (Pre V.2.0.0 Beta 1)</title>
    <link rel="icon" type="image/x-icon" href="/profile/favicon.ico">
    <link rel="apple-touch-icon" href="/profile/kuro_avatar.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #0f172a;
            overflow: hidden;
            min-height: 100vh;
        }
        
        .main-container {
            display: flex;
            min-height: 100vh;
            width: 100%;
            position: relative;
            z-index: 2;
        }

        #particles-js {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* Branding Side */
        .branding-side {
            flex: 1;
            background: rgba(15, 23, 42, 0.7);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 3rem;
            backdrop-filter: blur(5px);
        }

        .branding-content {
            text-align: left;
            max-width: 600px;
        }

        .kuro-logo-icon {
            font-size: 80px;
            color: #10b981;
            margin-bottom: 2rem;
            filter: drop-shadow(0 0 20px rgba(16, 185, 129, 0.4));
        }

        .welcome-text h1 {
            font-size: 3.5rem;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 1.5rem;
        }

        .welcome-text .highlight {
            background: linear-gradient(to right, #10b981, #34d399);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .bullet-points {
            list-style: none;
            margin-top: 2rem;
        }

        .bullet-points li {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .bullet-points li::before {
            content: '◆';
            color: #10b981;
            font-size: 0.8rem;
        }

        /* Login Side */
        .login-side {
            width: 500px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 4rem;
            box-shadow: -10px 0 50px rgba(0,0,0,0.2);
            position: relative;
        }

        .mobile-header {
            display: none;
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header {
            margin-bottom: 2.5rem;
        }

        .login-header h2 {
            font-size: 1.75rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 0.5rem;
        }

        .form-group {
            margin-bottom: 1.75rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.75rem;
            margin-left: 0.25rem;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 1.25rem;
            color: #64748b;
            font-size: 1.1rem;
            pointer-events: none;
            z-index: 5;
        }

        .input-wrapper input {
            width: 100%;
            padding: 1rem 1.25rem 1rem 3.5rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 16px;
            outline: none;
            transition: all 0.2s;
            font-size: 1rem;
            color: #0f172a;
            background: #f8fafc;
        }

        .input-wrapper input:focus {
            border-color: #10b981;
            background: white;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }

        .btn-login {
            width: 100%;
            background: #10b981;
            color: white;
            padding: 1.125rem;
            border-radius: 16px;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 1.5rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.75rem;
            border: none;
            cursor: pointer;
        }

        .btn-login:hover {
            background: #059669;
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.25);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .powered-by {
            margin-top: 4rem;
            text-align: center;
            padding-top: 2.5rem;
            border-top: 1px solid #f1f5f9;
        }

        .powered-by span {
            font-size: 0.75rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 600;
        }

        .logo-footer {
            margin-top: 1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        /* Error/Success Banners */
        .message-banner {
            padding: 1.25rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            display: none;
            font-size: 0.95rem;
        }

        .error-banner {
            background: #fff1f2;
            border: 1px solid #ffe4e6;
            color: #9f1239;
        }

        .success-banner {
            background: #f0fdf4;
            border: 1px solid #dcfce7;
            color: #166534;
        }

        .shake { animation: shake 0.5s ease-in-out; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid white;
            width: 22px; height: 22px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 1024px) {
            .branding-side { display: none; }
            .login-side { 
                width: 100%; 
                padding: 2.5rem; 
                background: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(10px);
            }
            .mobile-header { display: block; }
            body { 
                overflow: auto; 
                background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            }
            .main-container {
                align-items: center;
                justify-content: center;
                padding: 1.5rem;
            }
            .login-side {
                max-width: 450px;
                border-radius: 32px;
                box-shadow: 0 20px 50px rgba(0,0,0,0.3);
                justify-content: flex-start;
                padding-top: 4rem;
                padding-bottom: 4rem;
            }
        }
    </style>
</head>
<body>
    <div id="particles-js"></div>

    <div class="main-container">
        <!-- Left Section (Desktop) -->
        <div class="branding-side">
            <div class="branding-content">
                <i class="fa-solid fa-shield-cat kuro-logo-icon"></i>
                <div class="welcome-text">
                    <p class="text-emerald-400 font-semibold mb-2">Sovereign Artificial Intelligence</p>
                    <h1>Welcome to <br><span class="highlight">Kuro AI</span></h1>
                    <ul class="bullet-points">
                        <li>One Data</li>
                        <li>One App</li>
                        <li>One Network</li>
                        <li>One Platform</li>
                        <li>One Screen</li>
                    </ul>
                </div>
            </div>
        </div>

        <!-- Right Section -->
        <div class="login-side">
            <div class="mobile-header">
                <i class="fa-solid fa-shield-cat text-emerald-500 text-6xl mb-4"></i>
                <h1 class="text-3xl font-extrabold text-slate-900">Kuro AI</h1>
                <p class="text-slate-500 text-sm mt-1">Runtime Sovereign System</p>
            </div>

            <div class="login-header">
                <h2>Login to Dashboard</h2>
                <p class="text-slate-500 text-sm">Please enter your credentials to continue</p>
            </div>

            <!-- Banners -->
            <div id="errorMessage" class="message-banner error-banner">
                <div class="flex items-start gap-3">
                    <i data-lucide="alert-circle" class="w-5 h-5 flex-shrink-0"></i>
                    <div>
                        <p id="errorText"></p>
                        <p id="lockoutTimer" class="text-xs mt-1 opacity-80"></p>
                    </div>
                </div>
            </div>

            <div id="successMessage" class="message-banner success-banner">
                <div class="flex items-center gap-3">
                    <i data-lucide="check-circle" class="w-5 h-5 flex-shrink-0"></i>
                    <p>Login successful! Redirecting...</p>
                </div>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <div class="flex items-center mb-8">
                    <label class="flex items-center gap-3 cursor-pointer text-sm text-slate-600 font-medium">
                        <input type="checkbox" id="rememberMe" class="w-5 h-5 rounded-lg border-slate-300 text-emerald-500 focus:ring-emerald-500 transition-all">
                        Remember Me
                    </label>
                </div>

                <button type="submit" id="loginBtn" class="btn-login">
                    <span id="btnText">Sign In to Account</span>
                    <div id="btnSpinner" class="spinner hidden"></div>
                </button>
            </form>

            <div class="powered-by">
                <span>Powered By:</span>
                <div class="logo-footer">
                    <i class="fa-solid fa-shield-cat text-slate-300 text-2xl"></i>
                    <span class="font-bold text-slate-300">Kuro AI</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Initialize Lucide
        lucide.createIcons();

        // Particles.js Config
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 80, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#10b981" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.6, "random": false },
                "size": { "value": 3, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#10b981", "opacity": 0.4, "width": 1 },
                "move": { "enable": true, "speed": 1.5, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
            },
            "interactivity": {
                "detect_on": "canvas",
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.8 } } }
            },
            "retina_detect": true
        });

        // Form Logic
        const loginForm = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const rememberMe = document.getElementById('rememberMe');
        const loginBtn = document.getElementById('loginBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const errorMessage = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        const successMessage = document.getElementById('successMessage');

        function showError(message) {
            errorMessage.style.display = 'block';
            errorText.textContent = message;
            errorMessage.classList.add('shake');
            setTimeout(() => errorMessage.classList.remove('shake'), 500);
        }

        function hideError() {
            errorMessage.style.display = 'none';
        }

        function setLoading(loading) {
            if (loading) {
                loginBtn.disabled = true;
                btnText.style.display = 'none';
                btnSpinner.classList.remove('hidden');
            } else {
                loginBtn.disabled = false;
                btnText.style.display = 'block';
                btnSpinner.classList.add('hidden');
            }
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();
            setLoading(true);

            try {
                const formData = new FormData();
                formData.append('username', usernameInput.value);
                formData.append('password', passwordInput.value);
                formData.append('remember_me', rememberMe.checked);

                const response = await fetch('/api/login', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    successMessage.style.display = 'block';
                    setTimeout(() => window.location.href = '/', 1000);
                } else if (response.status === 423) {
                    const mins = data.remaining_minutes || Math.ceil((new Date(data.lockout_expires) - new Date()) / 60000) || "several";
                    showError(`Account temporarily locked. Try again in ${mins} minutes.`);
                    setLoading(false);
                } else {
                    showError(data.error || 'Login failed');
                    setLoading(false);
                }
            } catch (err) {
                showError('Connection error');
                setLoading(false);
            }
        });
    </script>
</body>
</html>
