<!DOCTYPE html>
<!--
  Header Doc ---
  Purpose: ISO / NIST / GDPR compliance dashboard for the consultant persona.
  Caller: main.py GET "/compliance".
  Dependencies: /api/compliance/*, Tailwind, Lucide icons.
  Main Sections: findings table, evidence uploader, control coverage cards.
  Side Effects: Polls /api/compliance/findings; POSTs evidence uploads.
-->
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kuro AI - Compliance Dashboard</title>
    <link rel="icon" type="image/x-icon" href="/profile/favicon.ico">
    <link rel="apple-touch-icon" href="/profile/kuro_avatar.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        glass: {
                            light: 'rgba(255, 255, 255, 0.1)',
                            dark: 'rgba(0, 0, 0, 0.2)',
                            border: 'rgba(255, 255, 255, 0.2)',
                            borderDark: 'rgba(255, 255, 255, 0.1)',
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gradient-to-br from-emerald-50 via-teal-50 to-cyan-50 dark:from-gray-900 dark:via-gray-800 dark:to-gray-900 min-h-screen transition-colors duration-500">
    
    <div class="fixed inset-0 -z-10 overflow-hidden">
        <div class="absolute -top-40 -right-40 w-80 h-80 bg-emerald-300 dark:bg-emerald-900 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-30"></div>
        <div class="absolute -bottom-40 -left-40 w-80 h-80 bg-teal-300 dark:bg-teal-900 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-3xl opacity-30"></div>
    </div>
    
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="fixed inset-y-0 left-0 z-50 w-72 bg-glass-light dark:bg-glass-dark backdrop-blur-xl border-r border-glass-border dark:border-glass-borderDark lg:translate-x-0">
            <div class="flex flex-col h-full">
                <div class="flex items-center gap-3 p-6 border-b border-glass-border dark:border-glass-borderDark">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-emerald-400 to-teal-500 flex items-center justify-center shadow-lg">
                        <i data-lucide="cat" class="w-6 h-6 text-white"></i>
                    </div>
                    <div>
                        <h1 class="text-lg font-bold text-gray-800 dark:text-white">Kuro AI</h1>
                        <p class="text-xs text-gray-500 dark:text-gray-400">Compliance Dashboard</p>
                    </div>
                </div>
                <nav class="flex-1 p-4 space-y-2">
                    <a href="/" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all">
                        <i data-lucide="message-square" class="w-5 h-5"></i><span>Chat</span>
                    </a>
                    <a href="/compliance" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 font-medium">
                        <i data-lucide="shield-check" class="w-5 h-5"></i><span>Compliance</span>
                    </a>
                    <a href="#" id="navAuditTrail" class="flex items-center gap-3 px-4 py-3 rounded-xl text-gray-600 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-700/50 transition-all">
                        <i data-lucide="file-text" class="w-5 h-5"></i><span>Audit Trail</span>
                    </a>
                </nav>
            </div>
        </aside>
        
        <!-- Main Content -->
        <main class="flex-1 flex flex-col lg:ml-72 overflow-y-auto">
            <header class="flex items-center justify-between px-6 py-4 bg-glass-light dark:bg-glass-dark backdrop-blur-xl border-b border-glass-border dark:border-glass-borderDark sticky top-0 z-10">
                <h2 class="text-xl font-semibold text-gray-800 dark:text-white">Compliance Dashboard</h2>
                <button id="darkModeToggle" class="p-2 rounded-xl bg-gray-100 dark:bg-gray-700">
                    <i data-lucide="sun" class="w-5 h-5 text-gray-600 dark:hidden"></i>
                    <i data-lucide="moon" class="w-5 h-5 text-gray-300 hidden dark:block"></i>
                </button>
            </header>
            
            <div class="p-6 space-y-6">
                <!-- Progress Cards -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="progressCards">
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">ISO 27001</h3>
                            <i data-lucide="shield" class="w-5 h-5 text-emerald-500"></i>
                        </div>
                        <div class="text-3xl font-bold text-gray-800 dark:text-white" id="isoProgress">0%</div>
                        <div class="mt-2 h-2 bg-gray-200 dark:bg-gray-700 rounded-full">
                            <div class="h-2 bg-emerald-500 rounded-full transition-all" id="isoBar" style="width: 0%"></div>
                        </div>
                        <p class="text-xs text-gray-500 mt-2" id="isoDetails">0 evidence items</p>
                    </div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">NIST 800-53</h3>
                            <i data-lucide="lock" class="w-5 h-5 text-blue-500"></i>
                        </div>
                        <div class="text-3xl font-bold text-gray-800 dark:text-white" id="nistProgress">0%</div>
                        <div class="mt-2 h-2 bg-gray-200 dark:bg-gray-700 rounded-full">
                            <div class="h-2 bg-blue-500 rounded-full transition-all" id="nistBar" style="width: 0%"></div>
                        </div>
                        <p class="text-xs text-gray-500 mt-2" id="nistDetails">0 evidence items</p>
                    </div>
                    <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
                        <div class="flex items-center justify-between mb-4">
                            <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400">GDPR</h3>
                            <i data-lucide="globe" class="w-5 h-5 text-purple-500"></i>
                        </div>
                        <div class="text-3xl font-bold text-gray-800 dark:text-white" id="gdprProgress">0%</div>
                        <div class="mt-2 h-2 bg-gray-200 dark:bg-gray-700 rounded-full">
                            <div class="h-2 bg-purple-500 rounded-full transition-all" id="gdprBar" style="width: 0%"></div>
                        </div>
                        <p class="text-xs text-gray-500 mt-2" id="gdprDetails">0 evidence items</p>
                    </div>
                </div>
                
                <!-- Quick Search -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
                    <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Quick Clause Search</h3>
                    <div class="flex gap-3">
                        <input type="text" id="searchInput" placeholder="Search clauses (e.g., 'access control', 'Article 32')..." 
                            class="flex-1 px-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-800 dark:text-white">
                        <select id="searchStandard" class="px-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-800 dark:text-white">
                            <option value="">All Standards</option>
                            <option value="iso27001">ISO 27001</option>
                            <option value="nist80053">NIST 800-53</option>
                            <option value="gdpr">GDPR</option>
                        </select>
                        <button id="searchBtn" class="px-6 py-2 bg-emerald-500 text-white rounded-xl hover:bg-emerald-600 transition-colors">
                            <i data-lucide="search" class="w-5 h-5"></i>
                        </button>
                    </div>
                    <div id="searchResults" class="mt-4 space-y-2"></div>
                </div>
                
                <!-- Evidence Matrix -->
                <div class="bg-white dark:bg-gray-800 rounded-2xl p-6 shadow-sm border border-gray-100 dark:border-gray-700">
                    <div class="flex items-center justify-between mb-4">
                        <h3 class="text-lg font-semibold text-gray-800 dark:text-white">Evidence Matrix</h3>
                        <select id="evidenceFilter" class="px-4 py-2 bg-gray-50 dark:bg-gray-700 border border-gray-200 dark:border-gray-600 rounded-xl text-gray-800 dark:text-white text-sm">
                            <option value="">All Standards</option>
                            <option value="iso27001">ISO 27001</option>
                            <option value="nist80053">NIST 800-53</option>
                            <option value="gdpr">GDPR</option>
                        </select>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm">
                            <thead>
                                <tr class="border-b border-gray-200 dark:border-gray-700">
                                    <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400">File Name</th>
                                    <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400">Category</th>
                                    <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400">Standard</th>
                                    <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400">Status</th>
                                    <th class="text-left py-3 px-4 text-gray-500 dark:text-gray-400">Finding</th>
                                </tr>
                            </thead>
                            <tbody id="evidenceTable"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // Dark mode
        if (localStorage.getItem('kuro-theme') === 'dark' || (!localStorage.getItem('kuro-theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        document.getElementById('darkModeToggle').addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('kuro-theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        });
        
        // Load progress
        async function loadProgress() {
            const standards = ['iso27001', 'nist80053', 'gdpr'];
            for (const std of standards) {
                try {
                    const res = await fetch(`/api/compliance/progress/${std}`);
                    const data = await res.json();
                    if (data.status === 'success') {
                        document.getElementById(`${std === 'iso27001' ? 'iso' : std === 'nist80053' ? 'nist' : 'gdpr'}Progress`).textContent = data.data.percentage + '%';
                        document.getElementById(`${std === 'iso27001' ? 'iso' : std === 'nist80053' ? 'nist' : 'gdpr'}Bar`).style.width = data.data.percentage + '%';
                        document.getElementById(`${std === 'iso27001' ? 'iso' : std === 'nist80053' ? 'nist' : 'gdpr'}Details`).textContent = `${data.data.total_evidence} evidence items`;
                    }
                } catch (e) { console.error(e); }
            }
        }
        
        // Load evidence
        async function loadEvidence(standard = '') {
            try {
                const url = standard ? `/api/compliance/evidence?standard=${standard}` : '/api/compliance/evidence';
                const res = await fetch(url);
                const data = await res.json();
                const tbody = document.getElementById('evidenceTable');
                tbody.innerHTML = '';
                if (data.status === 'success') {
                    data.data.forEach(item => {
                        const statusColor = item.status === 'compliant' ? 'text-emerald-500' : item.status === 'non_compliant' ? 'text-red-500' : 'text-yellow-500';
                        tbody.innerHTML += `<tr class="border-b border-gray-100 dark:border-gray-700">
                            <td class="py-3 px-4 text-gray-800 dark:text-white">${item.file_name}</td>
                            <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${item.category || '-'}</td>
                            <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${item.standard}</td>
                            <td class="py-3 px-4 ${statusColor} capitalize">${item.status}</td>
                            <td class="py-3 px-4 text-gray-600 dark:text-gray-400">${item.finding || '-'}</td>
                        </tr>`;
                    });
                }
            } catch (e) { console.error(e); }
        }
        
        // Search
        document.getElementById('searchBtn').addEventListener('click', async () => {
            const query = document.getElementById('searchInput').value;
            const standard = document.getElementById('searchStandard').value;
            if (!query) return;
            try {
                const res = await fetch(`/api/compliance/search?query=${encodeURIComponent(query)}&standard=${standard}`);
                const data = await res.json();
                const results = document.getElementById('searchResults');
                results.innerHTML = '';
                if (data.status === 'success' && data.data.length > 0) {
                    data.data.forEach(item => {
                        results.innerHTML += `<div class="p-3 bg-gray-50 dark:bg-gray-700 rounded-xl">
                            <div class="font-medium text-gray-800 dark:text-white">${item.standard} - ${item.clause_id}</div>
                            <div class="text-sm text-gray-600 dark:text-gray-400">${item.title}</div>
                        </div>`;
                    });
                } else {
                    results.innerHTML = '<p class="text-gray-500">No results found</p>';
                }
            } catch (e) { console.error(e); }
        });
        
        document.getElementById('evidenceFilter').addEventListener('change', (e) => loadEvidence(e.target.value));
        
        // Init
        lucide.createIcons();
        loadProgress();
        loadEvidence();
    </script>
</body>
</html>
